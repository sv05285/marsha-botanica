<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>
  <!-- Dark background -->
  <rect width="600" height="400" fill="#0a0a0a"/>
  <!-- Subtle texture lines -->
  <rect width="600" height="400" fill="url(#grain)" opacity="0.15"/>
  <!-- Grid pattern -->
  <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
  </pattern>
  <rect width="600" height="400" fill="url(#grid)"/>
  <!-- Red stamp box -->
  <rect x="60" y="120" width="480" height="160" rx="4" fill="none" stroke="#cc0000" stroke-width="6" opacity="0.9"/>
  <rect x="70" y="130" width="460" height="140" rx="2" fill="none" stroke="#cc0000" stroke-width="1.5" opacity="0.5"/>
  <!-- TOP SECRET text -->
  <text x="300" y="205" font-family="'Arial Black', sans-serif" font-size="72" font-weight="900" fill="#cc0000" text-anchor="middle" letter-spacing="8" opacity="0.95">TOP SECRET</text>
  <!-- Subtitle -->
  <text x="300" y="245" font-family="'Arial', sans-serif" font-size="14" fill="#666" text-anchor="middle" letter-spacing="6">CLASSIFIED · MARSHA BOTANICA</text>
  <!-- Corner marks -->
  <line x1="40" y1="40" x2="80" y2="40" stroke="#cc0000" stroke-width="2" opacity="0.4"/>
  <line x1="40" y1="40" x2="40" y2="80" stroke="#cc0000" stroke-width="2" opacity="0.4"/>
  <line x1="560" y1="40" x2="520" y2="40" stroke="#cc0000" stroke-width="2" opacity="0.4"/>
  <line x1="560" y1="40" x2="560" y2="80" stroke="#cc0000" stroke-width="2" opacity="0.4"/>
  <line x1="40" y1="360" x2="80" y2="360" stroke="#cc0000" stroke-width="2" opacity="0.4"/>
  <line x1="40" y1="360" x2="40" y2="320" stroke="#cc0000" stroke-width="2" opacity="0.4"/>
  <line x1="560" y1="360" x2="520" y2="360" stroke="#cc0000" stroke-width="2" opacity="0.4"/>
  <line x1="560" y1="360" x2="560" y2="320" stroke="#cc0000" stroke-width="2" opacity="0.4"/>
</svg>
