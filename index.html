<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="launch-mode" content="pre" />
  <title>Marsha Botanica — Coming Soon: The Nūr Collection</title>
  <meta name="description" content="Marsha Botanica is preparing to unveil The Nūr Collection. Three signature bars. Details under wraps." />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" type="image/jpeg" href="assets/img/logo.jpeg" />
</head>
<body>
  <main class="prelaunch-shell">
    <section class="hero-card reveal">
      <a href="index.html" class="brand-lockup" aria-label="Marsha Botanica home">
        <img src="assets/img/logo.jpeg" alt="Marsha Botanica" class="brand-logo" />
      </a>

      <p class="eyebrow">Marsha Botanica</p>
      <h1>Coming Soon: The Nūr Collection</h1>
      <p class="subtext">Three signature bars. Details under wraps.</p>

      <form class="waitlist-form" data-endpoint="" novalidate>
        <label class="sr-only" for="waitlist-email">Email address</label>
        <input id="waitlist-email" type="email" placeholder="Enter your email" autocomplete="email" required />
        <button type="submit">Get Early Access</button>
      </form>
      <p class="waitlist-status" aria-live="polite"></p>
      <p class="microcopy">Join the list for launch access and first notice.</p>
    </section>

    <section class="image-card reveal" aria-label="Prelaunch teaser image">
      <img src="assets/img/prelaunch-hero.png" alt="Marsha Botanica orange soap carton with a large top secret banner" class="hero-image" />
    </section>
  </main>

  <footer class="site-footer">
    <p>Marsha Botanica © 2026</p>
  </footer>

  <script src="assets/js/launch.js"></script>
</body>
</html>
