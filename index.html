<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marsha Botanica — Coming Soon</title>
<meta name="description" content="Coming Soon: The Nūr Collection. Three signature bars. Details under wraps.">
<style>
:root{--bg:#e4dbd1;--panel:rgba(242,236,229,.86);--text:#1f1916;--muted:#5f554c;--line:rgba(31,25,22,.10);--button:#221c19;--buttonText:#fffaf4;--input:rgba(255,250,244,.94);--shadow:0 18px 48px rgba(31,25,22,.11);--radius:22px}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Helvetica,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at top right,rgba(129,95,66,.14),transparent 30%),radial-gradient(circle at 8% 12%,rgba(255,255,255,.36),transparent 18%),linear-gradient(180deg,#f0e8e0 0%,var(--bg) 100%)}
.wrap{width:min(100%,1120px);margin:0 auto;padding:28px 18px 56px}
.top{display:flex;justify-content:center;padding:10px 0 18px}
.brand{display:inline-block;padding:10px 18px;border:1px solid var(--line);border-radius:999px;background:rgba(255,248,240,.55);letter-spacing:.14em;font-size:12px;font-weight:700;text-transform:uppercase}
.hero{display:grid;grid-template-columns:1.02fr .98fr;gap:28px;align-items:center;margin-top:10px}
.copy{background:var(--panel);border:1px solid rgba(255,255,255,.5);box-shadow:var(--shadow);border-radius:var(--radius);padding:32px}
.eyebrow{margin:0 0 12px;font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
h1{margin:0;font-size:clamp(38px,6vw,74px);line-height:.98;letter-spacing:-.03em}
.sub{margin:16px 0 0;font-size:clamp(17px,2.3vw,22px);line-height:1.45;color:var(--muted);max-width:34ch}
.form{margin-top:26px;display:flex;gap:10px;flex-wrap:wrap}
.email{flex:1 1 260px;min-width:0;height:56px;border-radius:16px;border:1px solid var(--line);background:var(--input);padding:0 16px;font-size:16px;color:var(--text);outline:none}
.btn{height:56px;border:0;border-radius:16px;padding:0 22px;background:var(--button);color:var(--buttonText);font-size:16px;font-weight:700;cursor:pointer;white-space:nowrap}
.status{margin-top:12px;min-height:22px;font-size:14px;color:var(--muted)}
.visual{border-radius:28px;overflow:hidden;box-shadow:0 24px 64px rgba(31,25,22,.15);border:1px solid rgba(255,255,255,.5);background:rgba(255,248,240,.6);position:relative}
.visual img{display:block;width:100%;height:auto}
.visual:after{content:"";position:absolute;inset:0;pointer-events:none}
.foot{margin-top:24px;text-align:center;font-size:13px;color:var(--muted);letter-spacing:.04em}
@media (max-width:860px){.hero{grid-template-columns:1fr;gap:18px}.copy{padding:24px 20px}.form{flex-direction:column}.btn{width:100%}}
</style>
</head>
